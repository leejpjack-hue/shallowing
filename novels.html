<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel Shadowing · 100 Days · French & Japanese</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Lora', 'serif'],
              jp: ['Noto Sans JP', 'sans-serif'],
            },
            colors: {
              french: { blue: '#0055A4', white: '#FFFFFF', red: '#EF4135' },
              japanese: { red: '#BC002D', light: '#FFF5F7' }
            }
          },
        },
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .animate-fade-in { animation: fadeIn .35s ease-out; }
      .animate-slide-up { animation: slideUp .35s ease-out; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      /* Furigana (ruby) styling — readings render above each kanji */
      ruby { ruby-position: over; ruby-align: center; }
      rt { font-size: 0.5em; font-weight: 500; color: #475569; letter-spacing: -0.01em; line-height: 1; }
      ruby > rt { text-align: center; }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/novels.tsx"></script>
  </body>
</html>
